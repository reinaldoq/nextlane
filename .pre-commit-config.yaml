repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
      - id: web-lint
        name: web lint+typecheck
        entry: bash -c 'npm --prefix web run lint && npm --prefix web run typecheck'
        language: system
        files: ^web/(.*\.(ts|tsx)|package\.json|tsconfig.*\.json|\.oxlintrc\.json)$
        pass_filenames: false
